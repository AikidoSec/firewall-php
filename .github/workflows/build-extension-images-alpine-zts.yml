name: Build Alpine PHP extension images (ZTS)

on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/Dockerfile.build-extension-alpine-zts
      - .github/workflows/build-extension-images-alpine-zts.yml

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: aikidosec/firewall-php-build-extension-alpine-zts
  VERSION: v1

jobs:
  build-amd64:
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        php_version: ['7.4','8.0','8.1','8.2','8.3','8.4','8.5']
      fail-fast: false
    permissions: { contents: read, packages: write }
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build & push (amd64)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: .github/workflows/Dockerfile.build-extension-alpine-zts
          platforms: linux/amd64
          push: true
          build-args: |
            PHP_VERSION=${{ matrix.php_version }}
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ matrix.php_version }}-${{ env.VERSION }}
